        <script>
            (function() {
                try {
                    var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                    var theme = prefersDark ? "dark" : "light";
                    document.cookie = "system-theme=" + theme + "; path=/; max-age=31536000";
                } catch (e) {
                    console.error("Theme detection error:", e);
                }
            })();
        </script>
    </body>
