name: 'Install dependencies'

description: 'Cache and install pnpm dependencies'

runs:
  using: 'composite'
  steps:
    - name: Cache dependencies
      id: cache
      uses: actions/cache@v3
      with:
        path: ./node_modules
        key: modules-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Install dependencies
      run: pnpm install
      shell: bash
