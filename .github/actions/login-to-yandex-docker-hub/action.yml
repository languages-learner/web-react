name: 'Login to Yandex Docker Hub'

runs:
  using: "composite"
  steps:
    - name: Get Yandex Cloud IAM token
      id: get_iam_token
      shell: bash
      run: |
        token=$(yc iam create-token)
        echo "::add-mask::$token"
        echo "token=$token" >> $GITHUB_OUTPUT

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: cr.yandex
        username: iam
        password: ${{ steps.get_iam_token.outputs.token }}
