name: Deploy

on:
  workflow_call:
    secrets:
      SA_DEPLOYER_PRIVATE_KEY:
        required: true
      S3_KEY_ID:
        required: true
        description: S3 key ID
      S3_SECRET_KEY:
        required: true
        description: S3 secret key
      SUPABASE_PROJECT_ID:
        required: true
      SUPABASE_PROJECT_URL:
        required: true
      SUPABASE_PROJECT_KEY:
        required: true
    inputs:
      revision_name:
        type: string
        required: true
      sa_deployer_id:
        description: Yandex Cloud service account Id
        type: string
        required: true
      cloud_id:
        description: Yandex Cloud Id
        type: string
        required: true
      folder_name:
        description: Yandex Cloud folder name
        type: string
        required: true
      container_registry_id:
        description: Yandex Cloud container registry id
        type: string
        required: true
      pr_number:
        description: Pull request number
        type: string
        required: false
      main:
        description: Is workflow running in main branch
        type: boolean
        default: false

jobs:
  deploy:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch only
        run: git fetch origin main --depth=100

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Install Yandex Cloud CLI
        uses: ./.github/actions/yc-cli-install
        with:
          SA_KEY: ${{ secrets.SA_DEPLOYER_PRIVATE_KEY }}

      - name: Install AWS CLI
        if: inputs.main == false
        uses: unfor19/install-aws-cli-action@v1
        with:
          version: 2.22.35
          arch: amd64

      - name: Fill .env
        run: |
          cp .env.example .env
          echo "SUPABASE_PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID }}" >> .env
          echo "VITE_SUPABASE_PROJECT_URL=${{ secrets.SUPABASE_PROJECT_URL }}" >> .env
          echo "VITE_SUPABASE_PROJECT_KEY=${{ secrets.SUPABASE_PROJECT_KEY }}" >> .env

      - name: Fetch bundle-stats (baseline) to compare with
        if: inputs.main == false
        working-directory: apps/web
        run: pnpm run bundle-stats:fetch-actual-baseline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1

      - name: Create Docker Image
        if: inputs.main == false
        working-directory: apps/web
        run: pnpm run build:docker

      - name: Create Docker Image (main)
        if: inputs.main == true
        working-directory: apps/web
        run: pnpm run build:baseline:docker

      - name: Extract bundle-stats
        if: inputs.main == false
        working-directory: apps/web
        run: pnpm run bundle-stats:get-from-docker

      - name: Extract bundle-stats (baseline)
        if: inputs.main == true
        working-directory: apps/web
        run: pnpm run bundle-stats:get-from-docker:baseline

      - name: Save bundle-stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          if-no-files-found: warn
          path: apps/web/.bundle-stats
          include-hidden-files: true

      - name: Save bundle-stats (baseline)
        if: inputs.main == true
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats-baseline
          if-no-files-found: error
          path: apps/web/.bundle-stats-baseline
          include-hidden-files: true

      - name: Login to Docker Hub
        uses: ./.github/actions/login-to-yandex-docker-hub

      - name: Push Docker Image
        id: push_docker_image
        run: |
          docker_image_tag=cr.yandex/${{ inputs.container_registry_id }}/web-react-app:${{ inputs.revision_name }}
          docker tag web-react-app $docker_image_tag
          docker push $docker_image_tag
          echo "docker_image_tag=$docker_image_tag" >> $GITHUB_OUTPUT

      - name: Create Container
        id: create_container
        run: |
          # Try to get the container ID
          container_info=$(yc serverless container get \
            --name "${{ inputs.revision_name }}" \
            --cloud-id "${{ inputs.cloud_id }}" \
            --folder-name "${{ inputs.folder_name }}" \
            --format json 2>/dev/null || true)

          if [ -n "$container_info" ]; then
            container_id=$(echo "$container_info" | yq .id)
            echo "Container already exists with ID: $container_id"
          else
            container_id=$(yc serverless container create \
              --name ${{ inputs.revision_name }} \
              --cloud-id ${{ inputs.cloud_id }} \
              --folder-name "${{ inputs.folder_name }}" | yq .id)
            echo "Created container with ID: $container_id"
          fi

          echo "container_id=$container_id" >> $GITHUB_OUTPUT

      - name: Deploy Container Revision
        if: inputs.main == false
        run: |
          yc serverless container revision deploy \
            --container-name ${{ inputs.revision_name }} \
            --image "${{ steps.push_docker_image.outputs.docker_image_tag }}" \
            --cores 1 \
            --memory 512mb \
            --concurrency 1 \
            --execution-timeout 30s \
            --cloud-id ${{ inputs.cloud_id }} \
            --folder-name "${{ inputs.folder_name }}" \
            --service-account-id ${{ inputs.sa_deployer_id }}

      - name: Deploy Container Revision (main)
        if: inputs.main == true
        run: |
          yc serverless container revision deploy \
            --container-name ${{ inputs.revision_name }} \
            --image "${{ steps.push_docker_image.outputs.docker_image_tag }}" \
            --cores 2 \
            --memory 1gb \
            --concurrency 10 \
            --execution-timeout 30s \
            --cloud-id ${{ inputs.cloud_id }} \
            --folder-name "${{ inputs.folder_name }}" \
            --service-account-id ${{ inputs.sa_deployer_id }} \
            --min-instances 1

      - name: Configure Api Gateway
        id: configure_api_gateway
        working-directory: apps/web
        run: |
          export sa_id="${{ inputs.sa_deployer_id }}"
          export container_id="${{ steps.create_container.outputs.container_id }}"
          (cat apigw.yaml.j2 | envsubst) > apigw.yaml
          cat apigw.yaml

          # Try to get the api-gateway ID
          gw_info=$(yc serverless api-gateway get \
            --name ${{ inputs.revision_name }} \
            --cloud-id ${{ inputs.cloud_id }} \
            --folder-name "${{ inputs.folder_name }}"
            --format json 2>/dev/null || true)

          if [ -n "$gw_info" ]; then
            gwdomain=$(echo "$gw_info" | yq .domain)
            echo "API Gateway already exists with DOMAIN: $gwdomain"
          else
            yc serverless api-gateway create \
              --name ${{ inputs.revision_name }} \
              --spec=apigw.yaml \
              --description "created from CI" \
              --cloud-id ${{ inputs.cloud_id }} \
              --folder-name "${{ inputs.folder_name }}"

            gwdomain=$(yc serverless api-gateway get ${{ inputs.revision_name }} \
              --cloud-id ${{ inputs.cloud_id }} \
              --folder-name "${{ inputs.folder_name }}" | yq .domain)
            echo "Created API Gateway with DOMAIN: $gwdomain"
          fi

          echo "https://"$gwdomain
          echo "stage_url=https://$gwdomain" >> $GITHUB_OUTPUT

      - name: Create Comment
        if: inputs.pr_number != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          number: ${{ inputs.pr_number }}
          header: deploy
          recreate: true
          message: |
            🚀 Stage environment deployed successfully!
            **Stage URL:** ${{ steps.configure_api_gateway.outputs.stage_url }}
