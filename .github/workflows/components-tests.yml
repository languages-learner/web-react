name: Components tests

on:
  workflow_call:

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Derive SHAs for base and head
        uses: nrwl/nx-set-shas@v4

      - name: Check if any project with test:component is affected
        id: check-affected
        run: |
          # Используем --with-target для фильтрации затронутых проектов по наличию target
          AFFECTED_WITH_TARGET=$(pnpm nx show projects --affected --with-target test:component --json)
          HAS_TARGET=$(echo "$AFFECTED_WITH_TARGET" | jq -r 'if type == "array" then (length > 0) else false end')
          echo "has-affected-projects=$HAS_TARGET" >> $GITHUB_OUTPUT
          echo "Affected projects with test:component target: $AFFECTED_WITH_TARGET"
          if [ "$HAS_TARGET" != "true" ]; then
            echo "No affected projects with test:component target, skipping tests"
          fi

      - name: Install Playwright browsers
        if: steps.check-affected.outputs.has-affected-projects == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Components tests
        if: steps.check-affected.outputs.has-affected-projects == 'true'
        run: pnpm nx affected -t test:component

      # - uses: actions/upload-artifact@v4
      #   if: ${{ !cancelled() }}
