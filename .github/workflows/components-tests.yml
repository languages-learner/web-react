name: Components tests

on:
  workflow_call:

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Derive SHAs for base and head
        uses: nrwl/nx-set-shas@v4

      - name: Check if any project with test:component:docker is affected
        id: check-affected
        run: |
          # Используем --with-target для фильтрации затронутых проектов по наличию target
          AFFECTED_WITH_TARGET=$(pnpm nx show projects --affected --with-target test:component:docker --json)
          HAS_TARGET=$(echo "$AFFECTED_WITH_TARGET" | jq -r 'if type == "array" then (length > 0) else false end')
          echo "has-affected-projects=$HAS_TARGET" >> $GITHUB_OUTPUT
          echo "Affected projects with test:component:docker target: $AFFECTED_WITH_TARGET"
          if [ "$HAS_TARGET" != "true" ]; then
            echo "No affected projects with test:component:docker target, skipping Docker build and tests"
          fi

      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v3

      # - name: Prepare package.json structure for Docker build
      #   run: pnpm exec ts-node ./scripts/component-tests/prepare-package-json.ts

      # - name: Prepare docker-compose volumes for Docker build
      #   run: pnpm exec ts-node ./scripts/component-tests/generate-volumes.ts

      - name: Build Docker image
        if: steps.check-affected.outputs.has-affected-projects == 'true'
        run: pnpm exec ts-node ./scripts/component-tests/build-image.ts

      # - name: Debug - List all Docker images
      #   run: |
      #     echo "=== All Docker images ==="
      #     docker images
      #     echo ""
      #     echo "=== Images matching web-react-playwright-ct ==="
      #     docker images | grep web-react-playwright-ct || echo "No images found matching web-react-playwright-ct"
      #     echo ""
      #     echo "=== Image details for web-react-playwright-ct:latest ==="
      #     docker image inspect web-react-playwright-ct:latest 2>&1 || echo "Image web-react-playwright-ct:latest not found"
      #     echo ""
      #     echo "=== Image details for web-react-playwright-ct (no tag) ==="
      #     docker image inspect web-react-playwright-ct 2>&1 || echo "Image web-react-playwright-ct not found"

      # - name: Debug - Check docker-compose expected image name
      #   run: |
      #     echo "=== Docker Compose Project Name ==="
      #     echo "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME"
      #     echo ""
      #     echo "=== Expected image name format ==="
      #     echo "Docker-compose expects: ${COMPOSE_PROJECT_NAME:-web-react}-playwright-ct"
      #     echo ""
      #     echo "=== Checking if docker-compose can find the image ==="
      #     docker compose config --services || true
      #     docker compose config | grep -A 5 "playwright-ct" || true
      #   env:
      #     COMPOSE_PROJECT_NAME: web-react

      - name: Run Components tests
        if: steps.check-affected.outputs.has-affected-projects == 'true'
        run: pnpm nx affected -t test:component:docker
        env:
          SKIP_BUILD: "true"
          # DOCKER_BUILDKIT: 1
          # BUILDKIT_INLINE_CACHE: 1
          # COMPOSE_DOCKER_CLI_BUILD: 1
          # COMPOSE_PROJECT_NAME: web-react

